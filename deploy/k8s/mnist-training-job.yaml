# 单次 MNIST 训练 Job。请先构建并推送镜像，或改用本地 kind/minikube 加载镜像。
apiVersion: batch/v1
kind: Job
metadata:
  name: mytorch-mnist-train
  labels:
    app: mytorch-uestc
    component: training
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: mytorch-uestc
        task: mnist-train
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: mytorch-uestc:latest
          imagePullPolicy: IfNotPresent
          args:
            - python
            - train_MNIST.py
            - --no-viz
            - --epochs
            - "5"
            - --data-root
            - /data
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: mnist-data
              mountPath: /data
      volumes:
        - name: mnist-data
          emptyDir: {}
